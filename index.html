<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Ein einfaches Tic Tac Toe-Spiel, erstellt mit HTML, CSS und JavaScript. Spiele gegen einen Freund oder den Computer.">
    <link rel="shortcut icon" href="./assets/tic-tac-toe-icon.png" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
    <title>Tic Tac Toe</title>
</head>

<body onload="init()">
    <header>
        <h1>Tic Tac Toe</h1>
    </header>
    <main>
        <div id="content">
        </div>
        <div id="again-btn">
            <button id="again" class="again hidden" onclick="again()">Noch einmal</button>
        </div>
    </main>
</body>

</html>
